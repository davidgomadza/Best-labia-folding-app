                ctx.fillStyle = gradient;
                ctx.ellipse(0, 0, 14 + (i % 7) * 1.5, 20 + Math.sin(i)*3, 0, 0, Math.PI*2);

                ctx.shadowBlur = 4;
                ctx.shadowColor = "rgba(210,70,120,0.2)";
